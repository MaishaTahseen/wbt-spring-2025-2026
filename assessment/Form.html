<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" type="text/css" href="Form.css">
</head>
<body>
    <header>
        <h1>Donor Information</h1>
    </header>
    <main>
        <section>
            <form method="post">
                    <div>
                        <table>
                            <tr>
                                <td class="label"><label for="firstName"><strong>First Name</strong><span>*</span></label></td>
                                <td><input type="text" id="firstName" name="firstName" required></td>
                            </tr>

                            <tr>
                                <td class="label"><label for="lastName"><strong>Last Name</strong><span>*</span></label></td>
                                <td><input type="text" id="lastName" name="lastName" required></td>
                            </tr>

                            <tr>
                                <td class="label"><label for="company"><strong>Company</strong></label></td>
                                <td><input type="text" id="company" name="company"></td>
                            </tr>

                            <tr>
                                <td class="label"><label for="address1"><strong>Address 1</strong><span>*</span></label></td>
                                <td><input type="text" id="address1" name="address1" required></td>
                            </tr>
                            
                            <tr>
                                <td class="label"><label for="address2"><strong>Address 2</strong></label></td>
                                <td><input type="text" id="address2" name="address2"></td>
                            </tr>

                            <tr>
                                <td class="label"><label for="city"><strong>City</strong><span>*</span></label></td>
                                <td><input type="text" id="city" name="city" required></td>
                            </tr>

                            <tr>
                                <td class="label"><label><strong>State</strong><span>*</span></label></td>
                                <td><select name="state" required>
                                        <option value="" disabled selected>Select a State</option>
                                        <option>New York</option>
                                        <option>Texas</option>
                                        <option>New Jersey</option>
                                    </select>
                                </td>
                            </tr>

                            <tr>
                                <td class="label"><label for="zipcode"><strong>Zip Code</strong><span>*</span></label></td>
                                <td><input type="number" id="zipcode" name="zipcode" required min="0"></td>
                            </tr>

                            <tr>
                                <td class="label"><label><strong>Country</strong><span>*</span></label></td>
                                <td><select name="country"  required>
                                        <option value="" disabled selected>Select a Country</option>
                                        <option>USA</option>
                                        <option>Mexico</option>
                                        <option>Canada</option>
                                    </select>
                                </td>
                            </tr>

                            <tr>
                                <td class="label"><label for="phnno"><strong>Phone</strong></label></td>
                                <td><input type="tel" id="phnno" name="phnno" pattern="" required></td>
                            </tr>

                            <tr>
                                <td class="label"><label for="fax"><strong>Fax</strong></label></td>
                                <td><input type="number" id="fax" name="fax" required min="0"></td>
                            </tr>

                            <tr>
                                <td class="label"><label for="email"><strong>Email</strong><span>*</span></label></td>
                                <td><input type="email" id="email" name="email" required></td>
                            </tr>

                            <tr>
                                <td class="label"><strong>Donation Amount</strong><span>*</span></td>
                                <td>
                                    <input type="radio" id="none" name="none" value="0" required>
                                    <label for="none">None</label>
                                    <input type="radio" id="50" name="50" value="50" required>
                                    <label for="50">$50</label>  
                                    <input type="radio" id="75" name="75" value="75" required>
                                    <label for="75">$75</label>   
                                    <input type="radio" id="100" name="100" value="100" required>
                                    <label for="100">$100</label>   
                                    <input type="radio" id="250" name="250" value="250" required>
                                    <label for="250">$250</label>   
                                    <input type="radio" id="other" name="other" value="other" required>
                                    <label for="other">Other</label>                                                         
                                </td>
                            </tr>

                            <tr>
                                <td class="label"> <span id="sub">(Check a button or type in your amount)</span></td>
                                <td> 
                                    <strong>Other Amount </strong> <input type="number" id="otheramount" name="otheramount" min="0">
                                </td>
                            </tr>

                            <tr>
                                <td class="label"><strong>Recurring Donation</strong></td>
                                <td><input type="checkbox" value="webdev">I am interested in giving on a regular basis.</td>
                            </tr>
                            <tr>
                                <td class="label"><span id="sub">(Check if yes)</span></td>
                                <td>Monthly Credit Card $ <input type="text" name="recamount" id="recamount"> For <input type="number" name="recmonth" id="recmonth" min="0"> Months</td>
                            </tr>
                            
                            <tr>
                                <td></td>
                                <td>
                                    <input type="submit">
                                    <input type="reset">
                                </td>
                            </tr>
                        </table>
                    </div>
            </form>
        </section>
    </main>
</body>
</html>
